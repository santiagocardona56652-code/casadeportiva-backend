<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CasaDeportiva - Partidos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: #fff; }

        .navbar {
            background: #111;
            padding: 16px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #FFB400;
        }
        .navbar h1 { color: #FFB400; font-size: 22px; }

        .filtros {
            display: flex;
            gap: 10px;
            padding: 20px 30px;
        }
        .filtro-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #333;
            background: #111;
            color: #999;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .filtro-btn.active, .filtro-btn:hover {
            background: #FFB400;
            color: #000;
            border-color: #FFB400;
            font-weight: 600;
        }

        .partidos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            padding: 10px 30px 30px;
        }

        .partido-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .partido-card:hover { transform: translateY(-3px); border-color: #FFB400; }

        .competicion {
            font-size: 11px;
            color: #FFB400;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .equipos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .equipo { font-size: 16px; font-weight: 600; text-align: center; flex: 1; }
        .vs { color: #555; font-size: 13px; margin: 0 10px; }

        .estado {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .PENDIENTE { background: #1a3a5c; color: #4fc3f7; }
        .EN_VIVO { background: #1a3a1a; color: #4caf50; }
        .FINALIZADO { background: #2a2a2a; color: #999; }

        .fecha { font-size: 12px; color: #666; margin-bottom: 14px; }

        .btn-apostar {
            width: 100%;
            background: #FFB400;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-apostar:hover { background: #e6a200; }
        .btn-apostar:disabled { background: #333; color: #666; cursor: not-allowed; }

        .msg { margin-top: 10px; padding: 8px; border-radius: 6px; font-size: 13px; text-align: center; }
        .msg.success { background: #1a3a1a; color: #4caf50; }
        .msg.error { background: #3a1a1a; color: #f44336; }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🏆 CasaDeportiva</h1>
    <span><a href="/" style="color:#FFB400; text-decoration:none;">← Volver</a></span>
</div>

<div class="filtros">
    <button class="filtro-btn active" onclick="filtrar('TODOS', this)">Todos</button>
    <button class="filtro-btn" onclick="filtrar('PENDIENTE', this)">Próximos</button>
    <button class="filtro-btn" onclick="filtrar('EN_VIVO', this)">🔴 En Vivo</button>
    <button class="filtro-btn" onclick="filtrar('FINALIZADO', this)">Finalizados</button>
</div>

<div class="partidos-grid" id="partidos"></div>

<!-- MODAL APUESTA -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
     background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#111; border:1px solid #FFB400; border-radius:12px; padding:30px; width:380px;">
        <h3 style="color:#FFB400; margin-bottom:20px; text-align:center;" id="modalTitulo"></h3>
        <div style="margin-bottom:16px;">
            <label style="color:#999; font-size:12px; display:block; margin-bottom:6px;">MONTO A APOSTAR ($)</label>
            <input id="montoInput" type="number" placeholder="Ej: 10000"
                style="width:100%; background:#1a1a1a; border:1px solid #333; border-radius:8px;
                       padding:12px; color:#fff; font-size:14px; outline:none;">
        </div>
        <p style="color:#999; font-size:13px; margin-bottom:12px; text-align:center;">¿Quién gana?</p>
        <div style="display:flex; gap:10px; margin-bottom:16px;">
            <button onclick="confirmarApuesta('LOCAL')"
                style="flex:1; background:#1a3a5c; color:#4fc3f7; border:none; border-radius:8px;
                       padding:10px; cursor:pointer; font-weight:600;">Local</button>
            <button onclick="confirmarApuesta('EMPATE')"
                style="flex:1; background:#2a2a1a; color:#FFB400; border:none; border-radius:8px;
                       padding:10px; cursor:pointer; font-weight:600;">Empate</button>
            <button onclick="confirmarApuesta('VISITANTE')"
                style="flex:1; background:#1a3a1a; color:#4caf50; border:none; border-radius:8px;
                       padding:10px; cursor:pointer; font-weight:600;">Visitante</button>
        </div>
        <div id="modalMsg" class="msg"></div>
        <button onclick="cerrarModal()"
            style="width:100%; background:#222; color:#999; border:none; border-radius:8px;
                   padding:10px; cursor:pointer; margin-top:8px;">Cancelar</button>
    </div>
</div>

<script>
    let todosLosPartidos = [];
    let partidoSeleccionado = null;

    async function cargarPartidos() {
        const res = await fetch('/api/partidos');
        todosLosPartidos = await res.json();
        mostrarPartidos(todosLosPartidos);
    }

    function mostrarPartidos(partidos) {
        const container = document.getElementById('partidos');
        container.innerHTML = '';
        partidos.forEach(p => {
            const fecha = new Date(p.fecha).toLocaleDateString('es-CO', {
                weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            const puedaApostar = p.estado === 'PENDIENTE';
            container.innerHTML += `
                <div class="partido-card">
                    <div class="competicion">${p.competicion}</div>
                    <div class="equipos">
                        <div class="equipo">${p.equipoLocal}</div>
                        <div class="vs">VS</div>
                        <div class="equipo">${p.equipoVisitante}</div>
                    </div>
                    <div><span class="estado ${p.estado}">${p.estado.replace('_', ' ')}</span></div>
                    <div class="fecha">📅 ${fecha}</div>
                    <button class="btn-apostar" ${!puedaApostar ? 'disabled' : ''}
                        onclick="apostar(${p.id}, '${p.equipoLocal}', '${p.equipoVisitante}')">
                        ${puedaApostar ? '💰 Apostar' : 'No disponible'}
                    </button>
                </div>`;
        });
    }

    function filtrar(estado, btn) {
        document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (estado === 'TODOS') mostrarPartidos(todosLosPartidos);
        else mostrarPartidos(todosLosPartidos.filter(p => p.estado === estado));
    }

    function apostar(id, local, visitante) {
        partidoSeleccionado = { id, local, visitante };
        document.getElementById('modalTitulo').textContent = local + ' vs ' + visitante;
        document.getElementById('modal').style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('montoInput').value = '';
        document.getElementById('modalMsg').className = 'msg';
        document.getElementById('modalMsg').textContent = '';
    }

    async function confirmarApuesta(prediccion) {
        const monto = document.getElementById('montoInput').value;
        const msg = document.getElementById('modalMsg');
        if (!monto || monto <= 0) {
            msg.className = 'msg error';
            msg.textContent = 'Ingresa un monto válido';
            return;
        }
        try {
            const res = await fetch('/api/apuestas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    usuarioId: 1,
                    partidoId: partidoSeleccionado.id,
                    monto: parseFloat(monto),
                    prediccion: prediccion
                })
            });
            const data = await res.json();
            if (res.ok) {
                msg.className = 'msg success';
                msg.textContent = '✅ Apuesta registrada por $' + monto;
                setTimeout(cerrarModal, 2000);
            } else {
                msg.className = 'msg error';
                msg.textContent = data;
            }
        } catch (e) {
            msg.className = 'msg error';
            msg.textContent = 'Error de conexión';
        }
    }

    cargarPartidos();
</script>
</body>
</html>
