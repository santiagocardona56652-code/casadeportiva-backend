<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CasaDeportiva - Apuestas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .container {
            background: #111;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 0 40px rgba(255, 180, 0, 0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #FFB400;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo p {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 1px solid #222;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            color: #666;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #FFB400;
            border-bottom: 2px solid #FFB400;
        }

        .form { display: none; }
        .form.active { display: block; }

        .input-group { margin-bottom: 16px; }

        .input-group label {
            display: block;
            color: #999;
            font-size: 12px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        .input-group input:focus { border-color: #FFB400; }

        .btn {
            width: 100%;
            background: #FFB400;
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.3s;
        }

        .btn:hover { background: #e6a200; }

        .msg {
            margin-top: 14px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .msg.success { background: #1a3a1a; color: #4caf50; display: block; }
        .msg.error { background: #3a1a1a; color: #f44336; display: block; }

        .link-partidos {
            color: #FFB400;
            font-size: 13px;
            text-decoration: none;
            text-align: center;
        }
        .link-partidos:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🏆 CasaDeportiva</h1>
            <p>La mejor plataforma de apuestas</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
            <div class="tab" onclick="switchTab('registro')">Registrarse</div>
        </div>

        <!-- LOGIN -->
        <div class="form active" id="loginForm">
            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="loginEmail" placeholder="tu@email.com">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()">Entrar</button>
            <div class="msg" id="loginMsg"></div>
        </div>

        <!-- REGISTRO -->
        <div class="form" id="registroForm">
            <div class="input-group">
                <label>Nombre completo</label>
                <input type="text" id="regNombre" placeholder="Tu nombre">
            </div>
            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="regEmail" placeholder="tu@email.com">
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <button class="btn" onclick="registrar()">Crear cuenta</button>
            <div class="msg" id="registroMsg"></div>
        </div>
    </div>

    <a href="/partidos.html" class="link-partidos">🏟️ Ver partidos disponibles →</a>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Form').classList.add('active');
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMsg');
            try {
                const res = await fetch('/api/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    msg.className = 'msg success';
                    msg.textContent = '¡Bienvenido ' + data.nombre + '! Saldo: $' + data.saldo;
                    setTimeout(() => window.location.href = '/partidos.html', 1500);
                } else {
                    const text = await res.text();
                    msg.className = 'msg error';
                    msg.textContent = text;
                }
            } catch (e) {
                msg.className = 'msg error';
                msg.textContent = 'Error de conexión';
            }
        }

        async function registrar() {
            const nombre = document.getElementById('regNombre').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msg = document.getElementById('registroMsg');
            try {
                const res = await fetch('/api/usuarios/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    msg.className = 'msg success';
                    msg.textContent = '¡Cuenta creada! Bienvenido ' + data.nombre;
                    setTimeout(() => window.location.href = '/partidos.html', 1500);
                } else {
                    const text = await res.text();
                    msg.className = 'msg error';
                    msg.textContent = text;
                }
            } catch (e) {
                msg.className = 'msg error';
                msg.textContent = 'Error de conexión';
            }
        }
    </script>
</body>
</html>
